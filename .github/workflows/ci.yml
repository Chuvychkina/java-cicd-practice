name: Java CI/CD Pipeline

# Когда запускать пайплайн
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Также можно запускать вручную из интерфейса
  workflow_dispatch:

# Что будет в пайплайне
jobs:
  # JOB 1: Тестирование
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Скачать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Установить Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Шаг 3: Кешировать зависимости (ускоряет сборку)
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      # Шаг 4: Запустить тесты
      - name: Run tests
        run: mvn clean test
      
      # Шаг 5: Сохранить отчёт о тестах (если упадут)
      - name: Upload test results
        if: always()  # Сохраняем даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # JOB 2: Сборка (зависит от успешных тестов)
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test  # Ждём успешного завершения test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      
      # Собрать JAR-файл
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      # Сохранить JAR как артефакт
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7

  # JOB 3: Ручной деплой (только для ветки develop)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'  # Только для ветки develop
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
      
      - name: Simulate deployment
        run: |
          echo "📦 Найден JAR файл:"
          ls -la *.jar
          echo "🚀 Деплой на staging окружение..."
          echo "✅ Деплой успешно завершён!"
      
      
